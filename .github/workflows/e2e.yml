name: E2E Test

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to test"
        required: false
        default: "main"

permissions:
  contents: read
  id-token: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      # Step 1: Generate .mcp.json with valid API key via Playwright
      - name: Setup TestRail API key
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Run /e2e-setup to get a valid API key from the TestRail demo site.
            This will generate a .mcp.json file with valid credentials.
            If it fails (e.g. demo site is down or credentials changed), report the failure clearly.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Bash(npx:*),Bash(curl:*),Bash(node:*),Bash(date:*),Bash(cat:*),Bash(test:*),WebFetch,Read,Write,Edit"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Step 2: Run E2E tests using the generated .mcp.json
      # Claude Code Action auto-detects .mcp.json in repo root
      - name: Run E2E tests
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Run /e2e-test to execute E2E regression tests against the TestRail demo site.
            The .mcp.json file has already been generated by the previous step.
            Use mcp__testrail__* tools to test each category.
            Report results as a summary table with PASS/FAIL status per tool.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Bash(npm:*),Bash(git:*),mcp__testrail__getProjects,mcp__testrail__getProject,mcp__testrail__getSuites,mcp__testrail__getSuite,mcp__testrail__addSuite,mcp__testrail__updateSuite,mcp__testrail__getSections,mcp__testrail__getSection,mcp__testrail__addSection,mcp__testrail__updateSection,mcp__testrail__deleteSection,mcp__testrail__moveSection,mcp__testrail__getCases,mcp__testrail__getCase,mcp__testrail__addCase,mcp__testrail__updateCase,mcp__testrail__updateCases,mcp__testrail__deleteCase,mcp__testrail__getCaseTypes,mcp__testrail__getCaseFields,mcp__testrail__getCaseHistory,mcp__testrail__copyToSection,mcp__testrail__moveToSection,mcp__testrail__getRuns,mcp__testrail__getRun,mcp__testrail__addRun,mcp__testrail__updateRun,mcp__testrail__getTests,mcp__testrail__getTest,mcp__testrail__getResults,mcp__testrail__getResultsForCase,mcp__testrail__getResultsForRun,mcp__testrail__addResultForCase,mcp__testrail__addResultsForCases,mcp__testrail__getPlans,mcp__testrail__addPlan,mcp__testrail__addPlanEntry,mcp__testrail__addRunToPlanEntry,mcp__testrail__getMilestones,mcp__testrail__getSharedSteps"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
